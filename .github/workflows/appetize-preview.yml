name: Appetize Preview

on:
  workflow_dispatch:

jobs:
  appetize-preview:
    name: Build APK and publish Appetize preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.4'

      - name: Ensure Gradle wrapper
        run: |
          set -euo pipefail
          if [ ! -x ./gradlew ] || [ ! -f ./gradle/wrapper/gradle-wrapper.jar ]; then
            gradle --no-daemon --max-workers=1 wrapper --gradle-version 8.14.4 --distribution-type bin
          fi
          chmod +x ./gradlew

      - name: Build debug APK
        env:
          GRADLE_OPTS: -Xmx4g -Dorg.gradle.daemon=false
          JAVA_TOOL_OPTIONS: -Xmx4g
        run: ./gradlew --no-daemon --max-workers=1 --stacktrace :app:assembleDebug

      - name: Locate APK
        id: apk
        run: |
          set -euo pipefail
          apk_path="$(find app/build/outputs/apk/debug -name "*.apk" -type f | head -n 1)"
          if [ -z "$apk_path" ]; then
            echo "No debug APK found." >&2
            exit 1
          fi
          echo "path=$apk_path" >> "$GITHUB_OUTPUT"
          echo "Found APK: $apk_path"
          echo "APK size: $(du -h "$apk_path" | cut -f1)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mehr-oder-weniger-debug-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Upload to Appetize.io
        id: appetize
        env:
          APPETIZE_API_TOKEN: ${{ secrets.APPETIZE_API_TOKEN || vars.APPETIZE_API_TOKEN || secrets.APPETIZE_TOKEN || vars.APPETIZE_TOKEN }}
          APPETIZE_PUBLIC_KEY: ${{ secrets.APPETIZE_PUBLIC_KEY || vars.APPETIZE_PUBLIC_KEY || secrets.APPETIZE_APP_PUBLIC_KEY || vars.APPETIZE_APP_PUBLIC_KEY }}
          APK_PATH: ${{ steps.apk.outputs.path }}
        run: |
          set -euo pipefail

          if [ -z "${APPETIZE_API_TOKEN}" ]; then
            echo "APPETIZE_API_TOKEN or APPETIZE_TOKEN is not configured." >&2
            exit 1
          fi

          upload_url="https://api.appetize.io/v1/apps"
          if [ -n "${APPETIZE_PUBLIC_KEY}" ]; then
            upload_url="${upload_url}/${APPETIZE_PUBLIC_KEY}"
            echo "Updating existing Appetize app ${APPETIZE_PUBLIC_KEY}."
          else
            echo "Creating a new Appetize app."
          fi

          response_file="$(mktemp)"
          http_status="$(curl --silent --show-error --location \
            --output "$response_file" \
            --write-out "%{http_code}" \
            --request POST "$upload_url" \
            --header "X-API-KEY: ${APPETIZE_API_TOKEN}" \
            --form "file=@${APK_PATH}" \
            --form "platform=android" \
            --form "fileType=apk" \
            --form "note=Mehr oder Weniger: Deutschland ${GITHUB_REF_NAME} ${GITHUB_SHA}")"

          if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
            echo "Appetize upload failed with HTTP ${http_status}." >&2
            cat "$response_file" >&2
            exit 1
          fi

          public_key="$(jq -r '.publicKey // .public_key // .app.publicKey // .app.public_key // empty' "$response_file")"
          build_id="$(jq -r '.buildId // .build_id // .build.id // .build.buildId // .build.build_id // empty' "$response_file")"

          if [ -z "$public_key" ] && [ -n "${APPETIZE_PUBLIC_KEY}" ]; then
            public_key="${APPETIZE_PUBLIC_KEY}"
          fi

          if [ -n "$build_id" ]; then
            preview_url="https://appetize.io/app/${build_id}"
          elif [ -n "$public_key" ]; then
            preview_url="https://appetize.io/app/${public_key}"
          else
            echo "Appetize upload succeeded, but no publicKey/buildId was found in the response." >&2
            cat "$response_file" >&2
            exit 1
          fi

          echo "preview_url=${preview_url}" >> "$GITHUB_OUTPUT"
          echo "public_key=${public_key}" >> "$GITHUB_OUTPUT"
          echo "build_id=${build_id}" >> "$GITHUB_OUTPUT"

          {
            echo "## Appetize Preview"
            echo ""
            echo "APK wurde erfolgreich gebaut und zu Appetize.io hochgeladen."
            echo ""
            echo "**Preview:** ${preview_url}"
            echo ""
            if [ -n "$public_key" ]; then
              echo "**Public Key:** \`${public_key}\`"
            fi
            if [ -n "$build_id" ]; then
              echo "**Build ID:** \`${build_id}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Print preview link
        run: echo "Appetize preview: ${{ steps.appetize.outputs.preview_url }}"
