name: Build and Upload to Appetize

on:
  workflow_dispatch:
  push:
    branches:
      - Codex_Edits

jobs:
  build-and-upload:
    name: Build debug APK and upload to Appetize
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK to Appetize
        env:
          APPETIZE_API_TOKEN: ${{ secrets.APPETIZE_API_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${APPETIZE_API_TOKEN}" ]; then
            echo "APPETIZE_API_TOKEN secret is not configured" >&2
            exit 1
          fi

          APK_PATH="$(find app/build/outputs/apk/debug -name '*.apk' -type f -print -quit)"
          if [ -z "$APK_PATH" ]; then
            echo "No debug APK found in app/build/outputs/apk/debug" >&2
            exit 1
          fi

          curl --fail --show-error --silent \
            -X POST "https://api.appetize.io/v1/apps" \
            -H "X-API-KEY: ${APPETIZE_API_TOKEN}" \
            -F "file=@${APK_PATH}" \
            -F "platform=android"
