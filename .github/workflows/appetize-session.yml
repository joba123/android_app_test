name: Appetize Session APK

on:
  workflow_dispatch:

jobs:
  build-and-upload:
    name: Build APK and publish Appetize session link
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.4'

      - name: Ensure Gradle wrapper
        run: |
          set -euo pipefail
          if [ ! -x ./gradlew ] || [ ! -f ./gradle/wrapper/gradle-wrapper.jar ]; then
            gradle --no-daemon --max-workers=1 wrapper --gradle-version 8.14.4 --distribution-type bin
          fi
          chmod +x ./gradlew

      - name: Build debug APK
        env:
          GRADLE_OPTS: -Xmx4g -Dorg.gradle.daemon=false
          JAVA_TOOL_OPTIONS: -Xmx4g
        run: ./gradlew --no-daemon --max-workers=1 --stacktrace :app:assembleDebug

      - name: Locate APK
        id: apk
        run: |
          set -euo pipefail
          apk_path="$(find app/build/outputs/apk/debug -name "*.apk" -type f | head -n 1)"
          if [ -z "$apk_path" ]; then
            echo "No debug APK found." >&2
            exit 1
          fi
          echo "path=$apk_path" >> "$GITHUB_OUTPUT"
          echo "Found APK: $apk_path"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-app-test-debug-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Upload APK to Appetize
        id: appetize
        env:
          APPETIZE_API_TOKEN: ${{ secrets.APPETIZE_API_TOKEN || vars.APPETIZE_API_TOKEN || secrets.APPETIZE_TOKEN || vars.APPETIZE_TOKEN }}
          APPETIZE_PUBLIC_KEY: ${{ secrets.APPETIZE_PUBLIC_KEY || vars.APPETIZE_PUBLIC_KEY }}
          APK_PATH: ${{ steps.apk.outputs.path }}
        run: |
          set -euo pipefail

          if [ -z "${APPETIZE_API_TOKEN}" ]; then
            echo "APPETIZE_API_TOKEN is not configured." >&2
            exit 1
          fi

          upload_url="https://api.appetize.io/v1/apps"
          if [ -n "${APPETIZE_PUBLIC_KEY}" ]; then
            upload_url="${upload_url}/${APPETIZE_PUBLIC_KEY}"
          fi

          response_file="$(mktemp)"
          http_status="$(curl --silent --show-error --location \
            --output "$response_file" \
            --write-out "%{http_code}" \
            --request POST "$upload_url" \
            --header "X-API-KEY: ${APPETIZE_API_TOKEN}" \
            --form "file=@${APK_PATH}" \
            --form "platform=android" \
            --form "fileType=apk")"

          echo "HTTP status: $http_status"
          cat "$response_file"
          echo ""

          if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
            echo "Appetize upload failed." >&2
            exit 1
          fi

          public_key="$(jq -r '.publicKey // empty' "$response_file")"
          if [ -z "$public_key" ] && [ -n "${APPETIZE_PUBLIC_KEY}" ]; then
            public_key="${APPETIZE_PUBLIC_KEY}"
          fi

          if [ -z "$public_key" ]; then
            echo "Could not determine Appetize publicKey from response." >&2
            exit 1
          fi

          session_url="https://appetize.io/app/${public_key}"
          echo "session_url=${session_url}" >> "$GITHUB_OUTPUT"
          echo "public_key=${public_key}" >> "$GITHUB_OUTPUT"

          {
            echo "## Appetize Session"
            echo ""
            echo "Session URL: ${session_url}"
            echo ""
            echo "Public key: ${public_key}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Print session link
        run: echo "Appetize session URL ${{ steps.appetize.outputs.session_url }}"
