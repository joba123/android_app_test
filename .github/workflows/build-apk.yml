name: Build APK

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload APK to Appetize.io
        if: ${{ github.event_name != 'pull_request' }}
        env:
          APPETIZE_API_TOKEN: ${{ secrets.APPETIZE_API_TOKEN || vars.APPETIZE_API_TOKEN }}
          APK_PATH: app/build/outputs/apk/debug/app-debug.apk
        run: |
          if [ -z "$APPETIZE_API_TOKEN" ]; then
            echo "APPETIZE_API_TOKEN is not configured; skipping Appetize.io upload."
            exit 0
          fi

          response_file="$(mktemp)"
          http_status="$(curl --silent --show-error --location \
            --output "$response_file" \
            --write-out "%{http_code}" \
            --request POST "https://api.appetize.io/v1/apps" \
            --header "X-API-KEY: ${APPETIZE_API_TOKEN}" \
            --form "file=@${APK_PATH}" \
            --form "platform=android")"

          if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
            echo "Appetize.io upload failed with HTTP status ${http_status}." >&2
            cat "$response_file" >&2
            exit 1
          fi

          build_id="$(jq -r '.buildId // .build_id // .publicKey // .public_key // .app.buildId // .app.build_id // .app.publicKey // .app.public_key // empty' "$response_file")"
          if [ -n "$build_id" ]; then
            echo "Uploaded APK to Appetize.io: https://appetize.io/app/${build_id}"
            {
              echo "### Appetize.io"
              echo "Uploaded APK: https://appetize.io/app/${build_id}"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Uploaded APK to Appetize.io."
            {
              echo "### Appetize.io"
              echo "Uploaded APK successfully, but no build ID was found in the API response."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-app-test-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
