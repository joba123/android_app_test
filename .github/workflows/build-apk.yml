name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.4'

      - name: Ensure Gradle wrapper
        run: |
          set -euo pipefail
          if [ ! -x ./gradlew ]; then
            gradle --no-daemon --max-workers=1 wrapper --gradle-version 8.14.4 --distribution-type bin
          fi
          chmod +x ./gradlew

      - name: Build debug APK
        env:
          GRADLE_OPTS: -Xmx4g -Dorg.gradle.daemon=false
          JAVA_TOOL_OPTIONS: -Xmx4g
        run: ./gradlew --no-daemon --max-workers=1 --stacktrace --info :app:assembleDebug

      - name: Locate debug APK
        id: debug-apk
        run: |
          set -euo pipefail
          apk_path="$(find . -path "*/build/outputs/apk/debug/*.apk" | head -n 1)"
          if [ -n "$apk_path" ] && [ -f "$apk_path" ]; then
            echo "path=$apk_path" >> "$GITHUB_OUTPUT"
            echo "Found debug APK: $apk_path"
            echo "Debug APK size: $(du -h "$apk_path" | cut -f1)"
          else
            echo "No debug APK found."
          fi

      - name: Upload APK to Appetize.io
        if: steps.debug-apk.outputs.path != ''
        env:
          APPETIZE_API_TOKEN: ${{ secrets.APPETIZE_API_TOKEN || vars.APPETIZE_API_TOKEN }}
          APPETIZE_PUBLIC_KEY: ${{ secrets.APPETIZE_PUBLIC_KEY || vars.APPETIZE_PUBLIC_KEY }}
          APK_PATH: ${{ steps.debug-apk.outputs.path }}
        run: |
          set -euo pipefail

          if [ -z "${APPETIZE_API_TOKEN}" ]; then
            echo "APPETIZE_API_TOKEN is not configured; skipping Appetize.io upload."
            exit 0
          fi

          if [ ! -f "${APK_PATH}" ]; then
            echo "APK was not found at ${APK_PATH}." >&2
            exit 1
          fi

          upload_url="https://api.appetize.io/v1/apps"
          if [ -n "${APPETIZE_PUBLIC_KEY}" ]; then
            upload_url="${upload_url}/${APPETIZE_PUBLIC_KEY}"
            echo "Updating existing Appetize.io app ${APPETIZE_PUBLIC_KEY}."
          else
            echo "Creating a new Appetize.io app. Set APPETIZE_PUBLIC_KEY to update the same app on future runs."
          fi

          response_file="$(mktemp)"
          http_status="$(curl --silent --show-error --location \
            --output "$response_file" \
            --write-out "%{http_code}" \
            --request POST "$upload_url" \
            --header "X-API-KEY: ${APPETIZE_API_TOKEN}" \
            --form "file=@${APK_PATH}" \
            --form "platform=android" \
            --form "note=android_app_test ${GITHUB_REF_NAME} ${GITHUB_SHA}")"

          if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
            echo "Appetize.io upload failed with HTTP status ${http_status}." >&2
            cat "$response_file" >&2
            exit 1
          fi

          app_key="$(jq -r '.publicKey // .public_key // .app.publicKey // .app.public_key // empty' "$response_file")"
          build_id="$(jq -r '.buildId // .build_id // .build.id // .build.buildId // .build.build_id // empty' "$response_file")"

          if [ -z "$app_key" ] && [ -n "${APPETIZE_PUBLIC_KEY}" ]; then
            app_key="${APPETIZE_PUBLIC_KEY}"
          fi

          if [ -z "$app_key" ] && [ -n "$build_id" ]; then
            app_url="https://appetize.io/app/${build_id}"
          elif [ -n "$app_key" ]; then
            app_url="https://appetize.io/app/${app_key}"
          else
            echo "Appetize.io upload succeeded, but the response did not contain a publicKey/buildId." >&2
            cat "$response_file" >&2
            exit 1
          fi

          echo "Uploaded APK to Appetize.io: ${app_url}"
          {
            echo "### Appetize.io"
            echo "Uploaded APK: ${app_url}"
            if [ -n "$app_key" ]; then
              echo "App public key: \`${app_key}\`"
              echo "Save this value as APPETIZE_PUBLIC_KEY to update this app instead of creating a new one."
            fi
            if [ -n "$build_id" ]; then
              echo "Build ID: \`${build_id}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload debug APK
        if: steps.debug-apk.outputs.path != ''
        uses: actions/upload-artifact@v4
        with:
          name: android-app-test-debug-apk
          path: ${{ steps.debug-apk.outputs.path }}
          if-no-files-found: ignore
