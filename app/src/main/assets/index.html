<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Sternenlabyrinth</title>
<style>
:root{--bg:#08101e;--panel:#10223d;--cyan:#72e8ff;--gold:#ffd650;--danger:#ff5166;--text:#f4fbff;--muted:#b8cde4}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;touch-action:none;user-select:none}body{background:radial-gradient(circle at 18% 12%,rgba(114,232,255,.18),transparent 28%),radial-gradient(circle at 88% 8%,rgba(142,95,255,.18),transparent 26%),linear-gradient(180deg,#070b22,#17123c 58%,#061b2e)}button{border:0;border-radius:18px;padding:14px 18px;min-height:56px;background:linear-gradient(180deg,#2b91c4,#24699e);color:white;font-weight:800;font-size:18px;box-shadow:0 0 0 2px rgba(114,232,255,.75),0 10px 24px rgba(0,0,0,.28)}button:active{transform:translateY(2px);filter:brightness(1.15)}.screen{position:absolute;inset:0;padding:calc(env(safe-area-inset-top) + 22px) 18px calc(env(safe-area-inset-bottom) + 18px);display:none}.screen.active{display:flex;flex-direction:column}.center{align-items:center;justify-content:center;text-align:center}.title{font-size:clamp(38px,10vw,62px);line-height:.98;margin:0 0 16px;font-weight:900;letter-spacing:.2px;text-shadow:0 8px 30px rgba(0,0,0,.45)}.subtitle{font-size:clamp(17px,4.3vw,24px);line-height:1.35;color:var(--muted);margin:0 auto 34px;max-width:620px}.stack{display:grid;gap:16px;width:min(92vw,430px)}.pill{padding:12px 16px;border-radius:999px;background:rgba(255,255,255,.09);color:#d7eafe;margin-top:24px}.topbar{display:flex;align-items:center;gap:10px;justify-content:space-between;margin-bottom:10px}.topbar h2{margin:0;font-size:clamp(24px,7vw,36px)}.small{font-size:14px;color:var(--muted)}.gridLevels{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:auto 0}.levelTile{aspect-ratio:1;border-radius:22px;background:rgba(30,72,110,.82);box-shadow:inset 0 0 0 2px rgba(114,232,255,.55);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;font-weight:900}.levelTile.locked{opacity:.42;filter:grayscale(.75)}.levelNo{font-size:34px}.panel{background:rgba(10,24,46,.7);border:1px solid rgba(114,232,255,.25);border-radius:24px;padding:18px;box-shadow:0 18px 45px rgba(0,0,0,.25)}#gameHeader{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}.stats{font-weight:800;color:#def7ff}.boardWrap{display:grid;place-items:center;flex:1;min-height:0}.board{display:grid;gap:4px;padding:8px;border-radius:22px;background:rgba(0,0,0,.25);box-shadow:0 0 0 1px rgba(255,255,255,.06),0 18px 45px rgba(0,0,0,.36)}.cell{width:var(--cell);height:var(--cell);border-radius:9px;background:rgba(44,92,132,.62);display:grid;place-items:center;position:relative}.cell:nth-child(odd){background:rgba(31,76,116,.64)}.wall{background:#171d31}.wall:after{content:"";width:62%;height:10%;border-radius:999px;background:#65708e}.exit:before{content:"";position:absolute;width:58%;height:58%;border:4px solid #895cff;border-radius:50%;box-shadow:inset 0 0 0 4px rgba(114,232,255,.9),0 0 18px rgba(137,92,255,.8)}.crystal:after{content:"";width:44%;height:44%;background:var(--gold);transform:rotate(45deg);box-shadow:0 0 18px rgba(255,214,80,.75)}.hazard:after{content:"";width:48%;height:48%;border-radius:50%;background:radial-gradient(circle,#ffb95e 0 28%,var(--danger) 31%);box-shadow:0 0 16px rgba(255,81,102,.8)}.player:before{content:"";position:absolute;width:58%;height:58%;border-radius:50%;background:radial-gradient(circle at 38% 32%,#fff 0 9%,#58ebff 11% 58%,#071a2d 60%);box-shadow:0 0 18px rgba(88,235,255,.95);z-index:2}.controls{display:grid;grid-template-columns:74px 74px 74px;grid-template-rows:64px 64px 64px;gap:8px;justify-content:center;margin-top:12px}.controls button{min-height:64px;padding:0;font-size:28px}.up{grid-column:2}.left{grid-column:1;grid-row:2}.right{grid-column:3;grid-row:2}.down{grid-column:2;grid-row:3}.gameActions{display:flex;justify-content:space-between;gap:12px;margin-top:10px}.gameActions button{min-height:46px;font-size:15px;flex:1}.stars{position:absolute;inset:0;pointer-events:none;overflow:hidden}.star{position:absolute;border-radius:50%;background:rgba(255,255,255,.65);animation:twinkle 2.6s ease-in-out infinite alternate}@keyframes twinkle{to{opacity:.2;transform:translateY(5px)}}.reduced .star{animation:none}.toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 18px);transform:translateX(-50%);background:rgba(5,12,24,.9);border:1px solid rgba(114,232,255,.35);border-radius:999px;padding:11px 16px;color:#e9faff;font-weight:700;opacity:0;transition:.25s;pointer-events:none}.toast.show{opacity:1}.resultIcon{font-size:54px;margin-bottom:12px}@media (max-height:720px){.controls{grid-template-columns:60px 60px 60px;grid-template-rows:52px 52px 52px}.controls button{min-height:52px}.screen{padding-top:14px}.subtitle{margin-bottom:18px}}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<section id="menu" class="screen active center"><h1 class="title">Sternenlabyrinth</h1><p class="subtitle">Ein taktisches Weltraum-Puzzle: Sammle alle Energiekerne, meide rote Pulsare und erreiche das Portal im Zuglimit.</p><div class="stack"><button onclick="continueGame()">Spielen</button><button onclick="show('levels')">Level auswählen</button><button onclick="show('settings')">Einstellungen</button></div><div class="pill" id="progressPill"></div></section>
<section id="levels" class="screen"><div class="topbar"><button onclick="show('menu')">←</button><h2>Level auswählen</h2><span class="small" id="levelProgress"></span></div><div class="gridLevels" id="levelGrid"></div></section>
<section id="settings" class="screen"><div class="topbar"><button onclick="show('menu')">←</button><h2>Einstellungen</h2><span></span></div><div class="panel stack"><button id="hapticsBtn" onclick="toggleHaptics()"></button><button id="motionBtn" onclick="toggleMotion()"></button><button onclick="resetProgress()">Fortschritt zurücksetzen</button><p class="subtitle" style="margin:0;font-size:16px">Steuerung: Wische über das Spielfeld oder nutze die Pfeiltasten. Jeder Schritt zählt, also plane die Route vor dem Portal.</p></div></section>
<section id="game" class="screen"><div id="gameHeader"><button onclick="show('menu')">Menü</button><div><div class="stats" id="levelName"></div><div class="small" id="stats"></div></div><button onclick="restartLevel()">Neu</button></div><div class="boardWrap"><div class="board" id="board"></div></div><div class="controls"><button class="up" onclick="move(0,-1)">↑</button><button class="left" onclick="move(-1,0)">←</button><button class="right" onclick="move(1,0)">→</button><button class="down" onclick="move(0,1)">↓</button></div></section>
<section id="result" class="screen center"><div class="resultIcon" id="resultIcon"></div><h1 class="title" id="resultTitle"></h1><p class="subtitle" id="resultMsg"></p><div class="stack"><button id="nextBtn"></button><button onclick="show('levels')">Level auswählen</button><button onclick="show('menu')">Hauptmenü</button></div></section>
<div class="toast" id="toast"></div>
<script>
const levels=[
{name:'Andocken',map:['......','.##...','......','...##.','......','......'],start:[0,0],exit:[5,5],limit:14,crystals:[[2,2],[4,0]],hazards:[]},
{name:'Pulsare',map:['.......','.###...','...#...','...#.#.','.......','.#..###','.......'],start:[0,6],exit:[6,0],limit:22,crystals:[[0,0],[4,4],[2,6]],hazards:[[3,1],[5,3]]},
{name:'Nebeltor',map:['........','.####...','....#...','##..#.##','....#...','.##...#.','........','...####.'],start:[0,0],exit:[7,7],limit:30,crystals:[[2,2],[6,1],[0,6]],hazards:[[3,4],[5,5]]},
{name:'Kernroute',map:['........','..##..#.','.#....#.','.#.##...','...##.#.','.#....#.','.#..##..','........'],start:[0,7],exit:[7,0],limit:34,crystals:[[0,0],[3,2],[6,5],[7,7]],hazards:[[4,1],[2,4],[5,6]]},
{name:'Orbitbruch',map:['.........','.###.###.','...#.....','##.#.###.','.........','.###.#.##','.....#...','.###.###.','.........'],start:[0,4],exit:[8,4],limit:38,crystals:[[0,0],[4,2],[4,6],[8,8]],hazards:[[2,2],[6,2],[3,6],[6,6]]},
{name:'Finale',map:['.........','.#.#.#.#.','.........','###.#.###','.........','.###.###.','.........','.#.#.#.#.','.........'],start:[0,8],exit:[8,0],limit:44,crystals:[[0,0],[2,2],[6,2],[4,4],[2,6],[6,6]],hazards:[[4,1],[1,4],[7,4],[4,7]]}
];
const store={get unlocked(){return +(localStorage.unlocked||1)},set unlocked(v){localStorage.unlocked=v},get haptics(){return localStorage.haptics!=='0'},set haptics(v){localStorage.haptics=v?'1':'0'},get reduced(){return localStorage.reduced==='1'},set reduced(v){localStorage.reduced=v?'1':'0'}};
let current=0,state=null,startX=0,startY=0;function $(id){return document.getElementById(id)}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');renderChrome();if(id==='levels')renderLevels();if(id==='game')renderGame();}
function renderChrome(){document.body.classList.toggle('reduced',store.reduced);$('progressPill').textContent=`Freigeschaltet: ${store.unlocked} / ${levels.length}`;$('levelProgress').textContent=`${store.unlocked}/${levels.length}`;$('hapticsBtn').textContent=`Haptik: ${store.haptics?'Ein':'Aus'}`;$('motionBtn').textContent=`Reduzierte Bewegung: ${store.reduced?'Ein':'Aus'}`}
function renderLevels(){const grid=$('levelGrid');grid.innerHTML='';levels.forEach((l,i)=>{const d=document.createElement('div');d.className='levelTile'+(i>=store.unlocked?' locked':'');d.innerHTML=`<div class="levelNo">${i<store.unlocked?i+1:'🔒'}</div><div>${l.name}</div>`;if(i<store.unlocked)d.onclick=()=>startLevel(i);grid.appendChild(d)})}
function continueGame(){startLevel(Math.max(0,store.unlocked-1))}function startLevel(i){current=Math.max(0,Math.min(i,levels.length-1));const l=levels[current];state={x:l.start[0],y:l.start[1],moves:0,got:new Set()};show('game');}
function restartLevel(){startLevel(current)}function key(x,y){return `${x},${y}`}function isWall(l,x,y){return x<0||y<0||y>=l.map.length||x>=l.map[0].length||l.map[y][x]==='#'}function has(list,x,y){return list.some(p=>p[0]===x&&p[1]===y)}
function renderGame(){if(!state)startLevel(0);const l=levels[current];$('levelName').textContent=`Level ${current+1}: ${l.name}`;$('stats').textContent=`Züge ${state.moves}/${l.limit} · Kerne ${state.got.size}/${l.crystals.length}`;const b=$('board'),cols=l.map[0].length,rows=l.map.length;const max=Math.min(innerWidth-38,innerHeight-315),cell=Math.floor(max/cols);b.style.setProperty('--cell',cell+'px');b.style.gridTemplateColumns=`repeat(${cols},var(--cell))`;b.innerHTML='';for(let y=0;y<rows;y++)for(let x=0;x<cols;x++){const c=document.createElement('div');c.className='cell';if(l.map[y][x]==='#')c.classList.add('wall');if(x===l.exit[0]&&y===l.exit[1])c.classList.add('exit');if(has(l.hazards,x,y))c.classList.add('hazard');const ci=l.crystals.findIndex(p=>p[0]===x&&p[1]===y);if(ci>=0&&!state.got.has(ci))c.classList.add('crystal');if(state.x===x&&state.y===y)c.classList.add('player');b.appendChild(c)}}
function move(dx,dy){if(!$('game').classList.contains('active'))return;const l=levels[current],nx=state.x+dx,ny=state.y+dy;if(isWall(l,nx,ny)){pulse('Wand blockiert');vibe(25);return}state.x=nx;state.y=ny;state.moves++;l.crystals.forEach((p,i)=>{if(p[0]===nx&&p[1]===ny){state.got.add(i);vibe(18)}});if(has(l.hazards,nx,ny))return finish(false,'Schiff beschädigt','Du bist in einen roten Pulsar geraten. Starte neu und halte Abstand.','☄️');if(nx===l.exit[0]&&ny===l.exit[1]&&state.got.size===l.crystals.length)return finish(true,current===levels.length-1?'Galaxie gerettet!':'Level geschafft!',`Alle Energiekerne sind sicher. Benötigte Züge: ${state.moves}.`,'✨');if(state.moves>=l.limit)return finish(false,'Energie leer','Das Zuglimit ist erreicht. Versuche eine kürzere Route.','🔋');renderGame()}
function finish(win,title,msg,icon){if(win&&current+1>=store.unlocked)store.unlocked=Math.min(levels.length,current+2);$('resultIcon').textContent=icon;$('resultTitle').textContent=title;$('resultMsg').textContent=msg;$('nextBtn').textContent=win&&current+1<levels.length?'Nächstes Level':'Nochmal spielen';$('nextBtn').onclick=()=>startLevel(win&&current+1<levels.length?current+1:current);vibe(win?55:75);show('result')}
function toggleHaptics(){store.haptics=!store.haptics;renderChrome()}function toggleMotion(){store.reduced=!store.reduced;renderChrome()}function resetProgress(){store.unlocked=1;renderChrome();pulse('Fortschritt zurückgesetzt')}
function pulse(t){const el=$('toast');el.textContent=t;el.classList.add('show');clearTimeout(pulse.t);pulse.t=setTimeout(()=>el.classList.remove('show'),1100)}function vibe(ms){if(store.haptics&&navigator.vibrate)navigator.vibrate(ms)}
function makeStars(){const s=$('stars');for(let i=0;i<54;i++){const e=document.createElement('i');e.className='star';const r=1+Math.random()*2.2;e.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${r}px;height:${r}px;animation-delay:${Math.random()*2}s`;s.appendChild(e)}}
addEventListener('keydown',e=>{if(e.key==='ArrowUp')move(0,-1);if(e.key==='ArrowDown')move(0,1);if(e.key==='ArrowLeft')move(-1,0);if(e.key==='ArrowRight')move(1,0)});let sx=0,sy=0;addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:false});addEventListener('touchend',e=>{const t=e.changedTouches[0],dx=t.clientX-sx,dy=t.clientY-sy;if(Math.hypot(dx,dy)>42&&$('game').classList.contains('active'))Math.abs(dx)>Math.abs(dy)?move(dx>0?1:-1,0):move(0,dy>0?1:-1)},{passive:false});
makeStars();renderChrome();renderLevels();
</script>
</body>
</html>
